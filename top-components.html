<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТОП СБОРОК ПК — ПК-Консультант</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/top.css">
<style>
/* ================= HEADER ================= */
.header {
    text-align: center;
    padding: 50px 20px 10px;
    position: relative;
    z-index: 2;
}
.header h1 {
    font-size: 64px;
    letter-spacing: 5px;
    color: #f3d6ff;
    text-shadow: 0 0 8px rgba(212,0,255,.8),
                 0 0 15px rgba(212,0,255,.6),
                 0 0 25px rgba(212,0,255,.5),
                 0 0 35px rgba(212,0,255,.4),
                 0 0 50px rgba(212,0,255,.3);
}
.header h2 {
    font-size: 24px;
    color: var(--violet-soft);
    margin-top: 10px;
}
.lang-btn {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    padding: 10px 18px;
    background: rgba(10,5,20,.9);
    border: 2px solid var(--border-violet);
    border-radius: 10px;
    cursor: pointer;
    color: #fff;
    font-family: 'Orbitron';
    transition: .3s;
}
.lang-btn:hover { transform: translateY(-50%) scale(1.05); }

/* ================= SLIDER ================= */
.pc-slider {
    width: 100%;
    margin-top: 40px;
    text-align: center;
    overflow: hidden;
    position: relative;
}
.slider-wrapper {
    position: relative;
    width: 100%;
    height: 500px;
}
.slider-track {
    display: flex;
    transition: transform 0.6s ease;
    height: 100%;
}
.build-slide {
    min-width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 50px;
    padding: 20px;
}
.build-slide img {
    width: 300px;
    height: 300px;
    object-fit: contain;
    border-radius: 12px;
}
.components-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
}
.components-list .component.price {
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 10px;
}
.slide-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 20px;
    z-index: 5;
    transition: .3s;
}
#prevBtn { left: 40px; }
#nextBtn { right: 40px; }
.slide-btn:hover { color: var(--violet-main); transform: translateY(-50%) scale(1.2); }

/* ================= NAV BUTTONS ================= */
.nav-buttons {
    text-align: center;
    margin-top: 20px;
}
.nav-btn {
    padding: 12px 22px;
    background: rgba(10,5,20,.9);
    border: 2px solid var(--border-violet);
    border-radius: 10px;
    text-decoration: none;
    color: #fff;
    box-shadow: 0 0 14px rgba(180,80,255,.35);
    transition: .25s;
}
.nav-btn:hover { box-shadow: 0 0 22px rgba(180,80,255,.65); transform: translateY(-1px); }
</style>
</head>
<body>

<div class="header">
    <h1 id="mainTitle">ТОП СБОРОК ПК</h1>
    <h2 id="subTitle">Для всех видов бюджета</h2>
    <button class="lang-btn" id="langBtn">RU</button>
</div>

<div class="pc-slider">
    <div class="slider-wrapper">
        <button class="slide-btn" id="prevBtn">←</button>
        <div class="slider-track" id="sliderTrack">
            <!-- Слайды будут вставлены через JS -->
        </div>
        <button class="slide-btn" id="nextBtn">→</button>
    </div>
</div>

<div class="nav-buttons">
    <a href="index.html" class="nav-btn" data-ru="← Назад к подбору" data-en="← Back to Selection">← Назад к подбору</a>
</div>

<script>
let lang = localStorage.getItem('lang') || 'ru';
const langBtn = document.getElementById('langBtn');
const track = document.getElementById('sliderTrack');
let currentIndex = 0;

// Массив сборок с полным комплектом комплектующих
const builds = [
  {
    img:"https://i.ibb.co/DD4DLL6V/deepcool-Photoroom.png",
    ru: {
      price:"Цена: 50 000 ₽",
      components:[
        "Процессор: Ryzen 5 3600",
        "Видеокарта: RX 5700",
        "ОЗУ: 16GB DDR4",
        "Накопитель: 1TB NVMe",
        "Блок питания: 650W",
        "Корпус: Deepcool Matrexx"
      ]
    },
    en: {
      price:"Price: $630",
      components:[
        "CPU: Ryzen 5 3600",
        "GPU: RX 5700 XT",
        "RAM: 16GB DDR4",
        "Storage: 1TB NVMe",
        "PSU: 650W",
        "Case: Deepcool Matrexx"
      ]
    }
  },
  {
    img:"https://i.ibb.co/h1F8C56t/msi-Photoroom.png",
    ru: {
      price:"Цена: 100 000 ₽",
      components:[
        "Процессор: Ryzen 5 7500f",
        "Видеокарта: RTX 5060",
        "ОЗУ: 32GB DDR5",
        "Накопитель: 1TB NVMe",
        "Блок питания: 750W",
        "Корпус: MSI MAG Forge"
      ]
    },
    en: {
      price:"Price: $1260",
      components:[
        "CPU: Ryzen 5 7600",
        "GPU: RTX 5060",
        "RAM: 32GB DDR5",
        "Storage: 1TB NVMe",
        "PSU: 750W",
        "Case: MSI MAG Forge"
      ]
    }
  },
  {
    img:"https://i.ibb.co/HTnzpQbS/lan-Photoroom.png",
    ru: {
      price:"Цена: 150 000 ₽",
      components:[
        "Процессор: Ryzen 7 7700",
        "Видеокарта: RTX 4070",
        "ОЗУ: 32GB DDR5",
        "Накопитель: 2TB NVMe",
        "Блок питания: 750W",
        "Корпус: Lian Li Lancool"
      ]
    },
    en: {
      price:"Price: $1890",
      components:[
        "CPU: Ryzen 7 7700",
        "GPU: RTX 4070",
        "RAM: 32GB DDR5",
        "Storage: 2TB NVMe",
        "PSU: 750W",
        "Case: Lian Li Lancool"
      ]
    }
  },
  {
    img:"https://i.ibb.co/jZrztdng/flow-Photoroom.png",
    ru: {
      price:"Цена: 200 000 ₽",
      components:[
        "Процессор: Ryzen 7 7800X3D",
        "Видеокарта: RTX 5070Ti",
        "ОЗУ: 32GB DDR5",
        "Накопитель: 2TB NVMe",
        "Блок питания: 850W",
        "Корпус: NZXT H7 Flow"
      ]
    },
    en: {
      price:"Price: $2520",
      components:[
        "CPU: Ryzen 7 7800X3D",
        "GPU: RTX 5070Ti",
        "RAM: 32GB DDR5",
        "Storage: 2TB NVMe",
        "PSU: 850W",
        "Case: NZXT H7 Flow"
      ]
    }
  },
  {
    img:"https://i.ibb.co/PGfZ1sWd/11-Photoroom.png",
    ru: {
      price:"Цена: 500 000 ₽",
      components:[
        "Процессор: Ryzen 7 9800X3D",
        "Видеокарта: RTX 5090",
        "ОЗУ: 64GB DDR5",
        "Накопитель: 4TB NVMe",
        "Блок питания: 1000W",
        "Корпус: Lian Li O11 Dynamic"
      ]
    },
    en: {
      price:"Price: $6300",
      components:[
        "CPU: Ryzen 7 9800X3D",
        "GPU: RTX 5090",
        "RAM: 64GB DDR5",
        "Storage: 4TB NVMe",
        "PSU: 1000W",
        "Case: Lian Li O11 Dynamic"
      ]
    }
  }
];

// Создаем слайды
function buildSlides() {
  track.innerHTML = '';
  builds.forEach(build => {
    const slide = document.createElement('div');
    slide.className = 'build-slide';

    const img = document.createElement('img');
    img.src = build.img;

    const list = document.createElement('div');
    list.className = 'components-list';

    const price = document.createElement('div');
    price.className = 'component price';
    price.setAttribute('data-ru', build.ru.price);
    price.setAttribute('data-en', build.en.price);
    list.appendChild(price);

    build.ru.components.forEach((comp, idx) => {
      const div = document.createElement('div');
      div.className = 'component';
      div.setAttribute('data-ru', build.ru.components[idx]);
      div.setAttribute('data-en', build.en.components[idx]);
      list.appendChild(div);
    });

    slide.appendChild(img);
    slide.appendChild(list);
    track.appendChild(slide);
  });
}

// Переключение языка
function applyLang() {
  langBtn.textContent = lang==='ru'?'RU':'EN';
  document.getElementById('mainTitle').textContent = lang==='ru'?'ТОП СБОРОК ПК':'TOP PC BUILDS';
  document.getElementById('subTitle').textContent = lang==='ru'?'Для всех видов бюджета':'For all budgets';

  document.querySelectorAll('.build-slide .component').forEach(el=>{
    el.textContent = el.getAttribute('data-'+lang);
  });
  document.querySelectorAll('[data-ru]').forEach(el=>{
    el.textContent = el.getAttribute('data-'+lang);
  });
}

langBtn.onclick = () => {
  lang = lang==='ru'?'en':'ru';
  localStorage.setItem('lang', lang);
  applyLang();
};

// Слайдер
function moveSlider() {
  track.style.transform = `translateX(-${currentIndex*100}%)`;
}
document.getElementById('nextBtn').onclick = () => {
  currentIndex = (currentIndex+1)%track.children.length;
  moveSlider();
};
document.getElementById('prevBtn').onclick = () => {
  currentIndex = (currentIndex-1+track.children.length)%track.children.length;
  moveSlider();
};

// Инициализация
buildSlides();
applyLang();
</script>
</body>
</html>
